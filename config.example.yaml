server:
  host: "0.0.0.0"
  port: 8585

patchmon:
  base_url: "http://your-patchmon-host:3000"
  token_key: "your-api-key"
  token_secret: "your-api-secret"

ansible:
  playbook_dir: "/root/ansible/playbooks"
  inventory_path: "/root/ansible/inventory/hosts"
  working_dir: "/root/ansible"
  max_concurrent_jobs: 3
  command_timeout: 1800

# Herdmon self-update: where the app's git checkout lives, and which
# remote ref the /api/app/version endpoint compares against.
app:
  repo_dir: "/root/moo-updater"
  tracking_branch: "origin/main"
  remote_check_ttl_seconds: 300

# Optional AI verification via OpenClaw. When enabled, after a job ends
# the runner POSTs job metadata to OpenClaw's /verify webhook. OpenClaw
# runs systemd/Uptime Kuma/PVE checks, asks OpenRouter for a verdict,
# DMs the result to WhatsApp, and returns the report. Herdmon renders
# the report in the terminal overlay.
openclaw:
  enabled: false
  verify_url: "http://192.168.2.226:9090/verify"
  maintenance_base_url: "http://192.168.2.226:9090"
  timeout_seconds: 120
  # Map playbook name -> verification kind understood by ops-verify.
  # Kinds: "proxmox_node", "lxc", "cluster".
  kinds:
    node-update: proxmox_node
    node-reboot: proxmox_node
    rolling-restart: cluster
    host-reboot: proxmox_node
    update-lxc-apps: lxc
    update-lxc-full: lxc
    update-lxc-backup: lxc
    drain-node: proxmox_node
    undrain-node: proxmox_node
    remediate-nfs: cluster

playbooks:
  # ----- LXC update variants -----
  # Note: apt-only patching is now handled by PatchMon's native wizard at
  # https://patchmon.sillymoo.dev (the old "update-lxc-system" mode was
  # retired 2026-04-29). The remaining modes here cover community-script
  # app updates and combined apt+app passes.
  - name: "update-lxc-apps"
    file: "update-lxc-apps-v2.yml"
    description: "Update LXC application layer via community-scripts update-apps.sh"
    groups: ["lxc"]

  - name: "update-lxc-full"
    file: "update-all.yml"
    description: "Update LXC system packages + community-script apps"
    groups: ["lxc"]

  - name: "update-lxc-backup"
    file: "update-lxc-with-backup.yml"
    description: "PBS backup then full LXC update (apt + apps)"
    groups: ["lxc"]

  # ----- Proxmox / cluster operations -----
  - name: "node-update"
    file: "update-all.yml"
    description: "Update packages on a single Proxmox node"
    groups: ["proxmox"]

  - name: "node-reboot"
    file: "rolling-restart.yml"
    description: "Reboot one Proxmox node (graceful workload shutdown + restart)"
    groups: ["proxmox"]
    extra_args: ["-e", "confirm_each_node=false"]

  - name: "rolling-restart"
    file: "rolling-restart.yml"
    description: "Rolling update + restart of all Proxmox nodes"
    groups: ["proxmox"]
    cluster_operation: true
    extra_args: ["-e", "confirm_each_node=false"]

  - name: "drain-node"
    file: "drain-node.yml"
    description: "Drain a Proxmox node via ha-manager without rebooting"
    groups: ["proxmox"]

  - name: "undrain-node"
    file: "undrain-node.yml"
    description: "Exit HA maintenance on a Proxmox node and resume service placement"
    groups: ["proxmox"]

  - name: "host-reboot"
    file: "reboot-host.yml"
    description: "Simple reboot (PBS or standalone hosts)"
    groups: []

  # ----- NFS remediation -----
  - name: "remediate-nfs"
    file: "remediate-nfs.yml"
    description: "Remount NFS and kick services on paperless + nzbget + arr stack"
    groups: ["nfs_clients"]
    cluster_operation: true

  # ----- Herdmon self-update + chained combos -----
  - name: "update-herdmon"
    file: "update-herdmon.yml"
    description: "Self-update: git pull + restart of this moo-updater service"
    groups: []
    cluster_operation: true

  - name: "update-all-pending"
    file: "update-all.yml"
    description: "Update every host with pending packages (used by UPDATE ALL PENDING)"
    groups: ["lxc", "proxmox"]

  # Example of a chained playbook. Running it queues the first job; when
  # it completes successfully the runner automatically starts the next
  # playbook in the chain. Chains abort on failure.
  - name: "update-lxcs-then-app"
    file: "update-all.yml"
    description: "Update all LXCs, then self-update Herdmon"
    groups: ["lxc"]
    chain: ["update-herdmon"]

cluster_nodes:
  - name: "node1"
    ip: "10.0.0.1"
    type: "proxmox"
  - name: "node2"
    ip: "10.0.0.2"
    type: "proxmox"
  - name: "node3"
    ip: "10.0.0.3"
    type: "proxmox"
  - name: "backup"
    ip: "10.0.0.4"
    type: "pbs"
